name: CICD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: true


jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      # - name: Check formatting
      #   run: bun run format:check
      # - name: Lint
      #   run: bun run lint
      # - name: Type Check
      #   run: bun run typecheck
      # - name: Run Unit Tests
      #   run: bun test
      - name: Build Application
        env:
          NODE_ENV: production
        run: bun run build
  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push App image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:app
            ghcr.io/${{ github.repository }}:app-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Migrate image 
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:migrate
            ghcr.io/${{ github.repository }}:migrate-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  upload-deployment-files:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          overwrite: true
          strip_components: 0
          source: |
            docker-compose.yml
            docker-compose.prod.yml
            caddy/Caddyfile
            bin/**
          target: /data/apps/journal
  deploy:
    needs: upload-deployment-files
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            export APP_IMAGE=ghcr.io/${{ github.repository }}:app-${{ github.sha }}
            export MIGRATE_IMAGE=ghcr.io/${{ github.repository }}:migrate-${{ github.sha }}
            cd /data/apps/journal
            ./bin/deploy.sh "$APP_IMAGE" "$MIGRATE_IMAGE"
  summary:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "Deployment finished"
