services:
  app:
    hostname: app
    container_name: app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
  migrate:
    command: bun run db:migrate
    hostname: app-migrate
    container_name: app-migrate
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
        restart: true
  db:
    image: postgres:latest
    hostname: db
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 10
  caddy:
    image: caddy:latest
    hostname: caddy
    container_name: caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - app
